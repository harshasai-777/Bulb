<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet"
    />
    <script defer src="script.js"></script>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="lamp">
                <div class="bulb-wrap">
                    <i id="bulbIcon" class="ri-lightbulb-line"></i>
                    <div id="pullChain" class="pull-chain" aria-hidden="true">
                        <span class="chain-line"></span>
                        <span class="chain-knob"></span>
                    </div>
                </div>
            </div>
            <button id="toggleBtn">On</button>
        </div>
    </div>
</body>
</html>
